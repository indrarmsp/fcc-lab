<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamer Setup Survey</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 id="title">Geek & Gamer Setup Survey</h1>
      <p id="description">Tell us about your ultimate battle station and gaming habits!</p>
    </header>

    <form id="survey-form">
      <div class="form-group">
        <label id="name-label" for="name">Name</label>
        <input 
          type="text" 
          id="name" 
          placeholder="Enter your gaming alias or real name" 
          required 
        />
      </div>

      <div class="form-group">
        <label id="email-label" for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          placeholder="Enter your email address" 
          required 
        />
      </div>

      <div class="form-group">
        <label id="number-label" for="number">Weekly Gaming Hours</label>
        <input 
          type="number" 
          id="number" 
          min="1" 
          max="168" 
          placeholder="Hours (e.g., 15)" 
        />
      </div>

      <div class="form-group">
        <label for="dropdown">Primary Platform</label>
        <select id="dropdown" required>
          <option value="" disabled selected>Select your battle station</option>
          <option value="pc">PC Master Race</option>
          <option value="console">Console (PS5 / Xbox / Switch)</option>
          <option value="mobile">Mobile / Handheld</option>
        </select>
      </div>

      <div class="form-group">
        <label>Preferred Setup Aesthetic</label>
        <div class="radio-checkbox-group">
          <label class="inline-label">
            <input 
              type="radio" 
              name="aesthetic" 
              value="rgb-neon" 
              checked 
            /> RGB / Neon Cyberpunk
          </label>
          <label class="inline-label">
            <input 
              type="radio" 
              name="aesthetic" 
              value="minimalist" 
            /> Clean & Minimalist Monochrome
          </label>
          <label class="inline-label">
            <input 
              type="radio" 
              name="aesthetic" 
              value="retro" 
            /> Vintage / Retro Cozy
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Peripherals You Own (Select all that apply)</label>
        <div class="radio-checkbox-group">
          <label class="inline-label">
            <input 
              type="checkbox" 
              name="peripherals" 
              value="mechanical-keyboard" 
            /> Mechanical Keyboard
          </label>
          <label class="inline-label">
            <input 
              type="checkbox" 
              name="peripherals" 
              value="ultrawide-monitor" 
            /> Ultrawide / Multi-Monitor
          </label>
          <label class="inline-label">
            <input 
              type="checkbox" 
              name="peripherals" 
              value="ergonomic-chair" 
            /> Ergonomic Gaming Chair
          </label>
          <label class="inline-label">
            <input 
              type="checkbox" 
              name="peripherals" 
              value="studio-mic" 
            /> Dedicated Studio Microphone
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="comments">Describe your dream upgrade:</label>
        <textarea 
          id="comments" 
          name="comments" 
          rows="4" 
          placeholder="If budget wasn't an issue, what piece of gear are you adding next?..."
        ></textarea>
      </div>

      <div class="form-group">
        <button type="submit" id="submit">Submit Station Specs</button>
      </div>
    </form>
  </div>
</body>
</html>
