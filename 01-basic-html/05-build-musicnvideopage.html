<!DOCTYPE html>
<!-- Media page -->

<html lang="en">
  <!-- Root element and language declaration -->

  <head>
    <!-- Document metadata -->
    <meta charset="UTF-8" />
    <title>Media Page</title>
    <!-- Browser tab title -->
  </head>

  <body>
    <!-- Visible content -->

    <h1>Media Player Page</h1>
    <!-- Main page heading -->

    <section>
      <!-- Video section -->
      <h2>Learning the Map Method</h2>

      <video controls width="640">
        <!-- Video player -->
        <source
          src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4"
          type="video/mp4"
        />
        <!-- MP4 source -->

        Your browser does not support the video tag.
        <!-- Fallback text -->
      </video>
    </section>

    <section>
      <!-- Audio section -->
      <h2>Enjoy Some Music</h2>

      <audio
        controls
        loop
        src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3"
      >
        <!-- Audio player -->

        Your browser does not support the audio element.
        <!-- Fallback text -->
      </audio>
    </section>
  </body>
</html>
