<!-- Declares the document type as HTML5 -->
<!DOCTYPE html>

<!-- Root element of the HTML page, language set to English -->
<html lang="en">

<head>
  <!-- Sets character encoding so text displays correctly -->
  <meta charset="UTF-8">

  <!-- Description of the page (used by search engines) -->
  <meta name="description" content="Explore amazing travel destinations, packages, and itineraries around the world.">

  <!-- Title shown in the browser tab -->
  <title>Travel Agency Page</title>
</head>

<body>

  <!-- Main heading of the page (only one <h1> is recommended) -->
  <h1>Explore Amazing Destinations</h1>

  <!-- Paragraph describing the website -->
  <p>Discover exciting travel opportunities across the world, from cultural landmarks to beautiful natural escapes.</p>

  <!-- Section heading -->
  <h2>Packages</h2>

  <!-- Description for the packages section -->
  <p>Choose from our variety of travel packages designed for different types of travelers.</p>

  <!-- Unordered list (bullet points) -->
  <ul>
    <li>
      <!-- Anchor tag creates a clickable link -->
      <!-- target="_blank" opens link in a new tab -->
      <a href="https://www.freecodecamp.org/learn" target="_blank">Group Travels</a>
    </li>
    <li>
      <a href="https://www.freecodecamp.org/learn" target="_blank">Private Tours</a>
    </li>
  </ul>

  <!-- Another section heading -->
  <h2>Top Itineraries</h2>

  <!-- Figure groups image + caption -->
  <figure>
    <!-- Link wrapping the image (image becomes clickable) -->
    <a href="https://www.freecodecamp.org/learn" target="_blank">
      <!-- Image element -->
      <!-- src = image URL -->
      <!-- alt = text shown if image fails + for accessibility -->
      <img src="https://cdn.freecodecamp.org/curriculum/labs/colosseo.jpg" alt="Colosseum in Rome">
    </a>
    <!-- Caption describing the image -->
    <figcaption>Visit the historic Colosseum in Rome</figcaption>
  </figure>

  <figure>
    <a href="https://www.freecodecamp.org/learn" target="_blank">
      <img src="https://cdn.freecodecamp.org/curriculum/labs/alps.jpg" alt="Alps mountains">
    </a>
    <figcaption>Experience the beauty of the Alps</figcaption>
  </figure>

  <figure>
    <a href="https://www.freecodecamp.org/learn" target="_blank">
      <img src="https://cdn.freecodecamp.org/curriculum/labs/sea.jpg" alt="Tropical beach">
    </a>
    <figcaption>Relax on a tropical beach getaway</figcaption>
  </figure>

</body>
</html>
