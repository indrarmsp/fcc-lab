<!DOCTYPE html>
<!-- Declares the document type and version of HTML (HTML5) -->

<html lang="en">
<!-- Root element of the page, language set to English -->

<head>
  <meta charset="UTF-8">
  <!-- Ensures proper character encoding (supports most characters) -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Makes the page responsive on different screen sizes -->

  <title>Working with the HTML Audio Element</title>
  <!-- Title shown in the browser tab -->
</head>

<body>
  <!-- Main content of the webpage -->

  <h1>freeCodeCamp Tunes</h1>
  <!-- Main heading of the page -->

  <!-- First Song -->
  <h2>Can't Stay Down</h2>
  <p>Artist: Quincy Larson</p>
  <audio 
    src="https://cdn.freecodecamp.org/curriculum/js-music-player/can't-stay-down.mp3" 
    loop 
    controls>
    <!-- 
      audio element:
      - src: URL of the audio file
      - controls: shows play/pause/volume UI
      - loop: repeats the audio automatically
    -->
  </audio>

  <!-- Second Song -->
  <h2>Cruising for a Musing</h2>
  <p>Artist: Quincy Larson</p>
  <audio 
    src="https://cdn.freecodecamp.org/curriculum/js-music-player/cruising-for-a-musing.mp3" 
    loop 
    controls>
  </audio>

  <!-- Third Song -->
  <h2>Scratching the Surface</h2>
  <p>Artist: Quincy Larson</p>
  <audio 
    src="https://cdn.freecodecamp.org/curriculum/js-music-player/scratching-the-surface.mp3" 
    loop 
    controls>
  </audio>

</body>
</html>
