<!DOCTYPE html>
<!-- Audio player page -->

<html lang="en">
  <!-- Root element and language declaration -->

  <head>
    <!-- Document metadata -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Working with the HTML Audio Element</title>
    <!-- Browser tab title -->
  </head>

  <body>
    <!-- Visible content -->

    <h1>freeCodeCamp Tunes</h1>
    <!-- Main page heading -->

    <h2>Can't Stay Down</h2>
    <!-- First track -->
    <p>Artist: Quincy Larson</p>
    <audio src="https://cdn.freecodecamp.org/curriculum/js-music-player/can't-stay-down.mp3" loop controls>
    </audio>
    <!-- Audio element with looping playback -->

    <h2>Cruising for a Musing</h2>
    <!-- Second track -->
    <p>Artist: Quincy Larson</p>
    <audio src="https://cdn.freecodecamp.org/curriculum/js-music-player/cruising-for-a-musing.mp3" loop controls>
    </audio>

    <h2>Scratching the Surface</h2>
    <!-- Third track -->
    <p>Artist: Quincy Larson</p>
    <audio src="https://cdn.freecodecamp.org/curriculum/js-music-player/scratching-the-surface.mp3" loop controls>
    </audio>
  </body>
</html>
