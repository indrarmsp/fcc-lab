<!doctype html>
<!-- Declares the document type and HTML5 standard -->

<html lang="en">
  <!-- Root element of the HTML document, language set to English -->

  <head>
    <!-- Metadata and document settings -->

    <meta charset="UTF-8" />
    <!-- Sets character encoding to UTF-8 (supports most characters and symbols) -->

    <title>Heart Icon</title>
    <!-- Title shown in the browser tab -->

  </head>

  <body>
    <!-- Visible content of the webpage -->

    <!-- SVG (Scalable Vector Graphics) container -->
    <!-- width & height define displayed size -->
    <!-- viewBox defines the internal coordinate system (0 0 to 24 24) -->
    <!-- fill="red" colors all shapes inside the SVG red -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="red">
      
      <!-- Path element draws the actual heart shape -->
      <!-- The "d" attribute contains path commands and coordinates -->
      <!-- M = move to starting point -->
      <!-- s, C, etc. = curve and drawing commands -->
      <!-- These numbers define the heart shape precisely -->
      <path
        d="M12 21s-6-4.35-9.33-8.22C-.5 7.39 3.24 1 8.4 4.28 10.08 5.32 12 7.5 12 7.5s1.92-2.18 3.6-3.22C20.76 1 24.5 7.39 21.33 12.78 18 16.65 12 21 12 21z"
      ></path>
      
    </svg>

  </body>
</html>
