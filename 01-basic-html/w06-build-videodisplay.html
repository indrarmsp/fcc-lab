<!DOCTYPE html>
<!-- Declares the document type and version of HTML (HTML5) -->

<html lang="en">
  <!-- Root element of the page, with language set to English -->

  <head>
    <!-- Contains meta information about the document -->

    <meta charset="UTF-8" />
    <!-- Sets character encoding to UTF-8 (supports most characters and symbols) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Makes the page responsive on different screen sizes (important for mobile devices) -->

    <title>Display Videos in an iframe</title>
    <!-- Title shown in the browser tab -->
  </head>

  <body>
    <!-- Contains all visible content of the webpage -->

    <h1>iframe Video Display</h1>
    <!-- Main heading of the page -->

    <iframe
      width="560"
      height="315"
      <!-- Sets the width and height of the video player -->

      src="https://www.youtube.com/embed/I0_951_MPE0"
      <!-- URL of the embedded YouTube video (uses /embed/ format) -->

      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; web-share"
      <!-- Specifies which browser features the iframe is allowed to use:
           - accelerometer: motion sensor access
           - autoplay: allows video to play automatically
           - clipboard-write: allows copying content
           - encrypted-media: allows protected content playback
           - gyroscope: orientation sensor access
           - web-share: enables sharing features -->

      referrerpolicy="strict-origin-when-cross-origin"
      <!-- Controls how much referrer information is sent when loading the iframe:
           - Only sends origin (domain) when navigating to a different origin -->

      allowfullscreen
      <!-- Allows the video to be viewed in fullscreen mode -->
    >
    </iframe>
    <!-- Embeds external content (YouTube video) into the webpage -->

  </body>
</html>
