<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donation Form</title>
</head>
<body>
  <h1>Donation Form</h1>
  <form>
    
    <label for="full-name">Full Name:</label>
    <input type="text" id="full-name" name="name" required>

    <label for="email-address">Email Address:</label>
    <input type="email" id="email-address" name="email" required>

    <label for="donation-amount">Donation Amount ($):</label>
    <input type="number" id="donation-amount" name="amount" required>

    <input type="checkbox" id="subscribe-newsletter" name="newsletter">
    <label for="subscribe-newsletter">Subscribe</label>

    <input type="submit" value="Send">
  </form>
</body>
</html>
